<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body><center><h1>
<form action="dis" method="post">
<table>
<tr>
<td>Name</td>
<td> <input type="text" name="tname" value=""></td>
</tr>

<tr>
<td>Age</td>
<td><input type="text" name="tage" value="" ></td>
</tr>

<tr>
<td> Gender</td>
<td><input type="radio" name="gen" value="M" checked="checked"/>Male
<input type="radio" name="gen" value="F" />Female
</td>
</tr>

<tr>
<td>Address</td>
<td>
<textarea name="taddress" rows="4" cols="20">Enter Address</textarea>
</td>
</tr>

<tr>
<td>Marital status</td>
<td><input type="checkbox" name="ms" value="married"/>Married
<input type="checkbox" name="ms" value="single"/>Un-Married
</td>
</tr>

<tr>
<td> Qualification</td>
<td>
<select name="qlfy">
<option value="B.Tech">Engg</option>
<option value="MBBS">Medical</option>
<option value="B.A">Arts</option>
</select>
</td>
</tr>

<tr>
<td>Courses</td>
<td>
<select name="crs" size="3" multiple="multiple">
<option value="JAVA">JAVA</option>
<option value=".NET">.NET</option>
<option value="TESTING">"TESTING"</option>
</select>
</td>
</tr>

<tr>
<td>Hobbies</td>
<td>
<input type="checkbox" name="hb" value="read" checked/>Reading
<input type="checkbox" name="hb" value="sports" />Online Gaming
<input type="checkbox" name="hb" value="travel" />Travelling
</td>
</tr>

<tr>
<td colspan="2">
<input type="submit" value="submit">
<input type="reset" value="cancel">
</td>
</tr>
</table>
</form>
</h1>

</body>
</html>
