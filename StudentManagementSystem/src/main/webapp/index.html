<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>

body{
	margin:0;
	padding:0;
	font-family:Arial, sans-serif;
	background:linear-gradient(to right,#4facfe,#00f2fe);
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
}

.container{
	width:400px;
	background:white;
	padding:30px;
	border-radius:10px;
	box-shadow:0px 0px 15px yellow;
}

h2{
	text-align:center;
	color:#333;
	margin-bottom:25px;
}

.input-box{
	margin-bottom:20px;
}

label{
	font-weight:bold;
	display:flex;
	margin-bottom:5px;
	color:#444;
}

input[type="text"]{
	width:100%;
	padding:10px;
	border:3px solid black;
	border-radius:8px;
	font-size:15px;
}

input[type="text"]:focus{
	border-color:#4facfe;
	outline:none;
	box-shadow:0 0 5px #4facfe;
}

input[type="submit"]{
	width:100%;
	padding:12px;
	background:#4facfe;
	color:white;
	border:none;
	border-radius:8px;
	font-size:16px;
	cursor:pointer;
	font-weight:bold;
}

input[type="submit"]:hover{
	background:#00c6fb;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Registration Form(Create the new Record)</h2>

<form action="add" method="post">


<div class="input-box">
<label>Student Name</label>
<input type="text" name="sname" placeholder="Enter Student Name">
</div>

<div class="input-box">
<label>Student Email</label>
<input type="text" name="semail" placeholder="Enter Student Email">
</div>

<div class="input-box">
<label>Student Course</label>
<input type="text" name="scourse" placeholder="Enter Student Course">
</div>

<input type="submit" value="Register">

</form>

</div>

</body>
</html>
