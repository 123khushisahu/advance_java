<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Insert title here</title>

<style>

body{
	margin:0;
	padding:0;
	background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
	font-family:Arial,sans-serif;
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
}

/* Main Box */
.main-box{
	background:rgba(255,255,255,0.12);
	backdrop-filter:blur(10px);
	padding:50px;
	border-radius:25px;
	text-align:center;
	box-shadow:0px 8px 25px rgba(0,0,0,0.4);
	width:500px;
	border:1px solid rgba(255,255,255,0.2);
}

/* Heading */
h1{
	color:white;
	font-size:42px;
	text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

/* Links */
a{
	text-decoration:none;
	font-size:26px;
	color:white;
	background:linear-gradient(45deg,#111827,#1f2937);
	padding:15px 35px;
	border-radius:12px;
	display:inline-block;
	transition:0.4s;
	box-shadow:0px 5px 15px rgba(0,0,0,0.3);
}

/* Hover Effect */
a:hover{
	background:linear-gradient(45deg,#ef4444,#dc2626);
	transform:scale(1.08);
}

</style>

</head>
<body>

<div class="main-box">

<center>
<h1>
<u><i>Online Electronic Store</i></u><br><br>

<a href ="AdminLogin.html">Admin Login</a><br><br>

<a href ="CustomerLogin.html">Customer Login</a><br><br>

</h1>
</center>

</div>

</body>
</html>
