<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Admin Login</title>

<style>

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
}

body{
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	font-family:Arial,sans-serif;
	background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

/* Login Box */
.box{
	width:420px;
	padding:45px;
	background:rgba(255,255,255,0.12);
	backdrop-filter:blur(10px);
	border-radius:25px;
	text-align:center;
	box-shadow:0px 8px 25px rgba(0,0,0,0.4);
	border:1px solid rgba(255,255,255,0.2);
}

/* Heading */
h1{
	color:white;
	font-size:38px;
	margin-bottom:30px;
	text-shadow:2px 2px 10px rgba(0,0,0,0.4);
}

/* Labels */
label{
	display:block;
	text-align:left;
	color:white;
	font-size:18px;
	margin-bottom:8px;
	margin-top:15px;
}

/* Input Fields */
input[type="text"],
input[type="password"]{
	width:100%;
	padding:14px;
	border:none;
	outline:none;
	border-radius:12px;
	font-size:16px;
	background:rgba(255,255,255,0.9);
}

/* Login Button */
input[type="submit"]{
	width:100%;
	margin-top:30px;
	padding:14px;
	border:none;
	border-radius:12px;
	font-size:20px;
	font-weight:bold;
	background:linear-gradient(45deg,#111827,#1f2937);
	color:white;
	cursor:pointer;
	transition:0.4s;
	box-shadow:0px 5px 15px rgba(0,0,0,0.3);
}

/* Hover Effect */
input[type="submit"]:hover{
	background:linear-gradient(45deg,#ef4444,#dc2626);
	transform:scale(1.03);
}

/* Footer */
.footer{
	margin-top:20px;
	color:#dbeafe;
	font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h1>
<u>Admin Login</u>
</h1>

<form action="alog" method="post">

<label>UserName</label>
<input type="text" name="aname" placeholder="Enter UserName">

<label>Password</label>
<input type="password" name="apwd" placeholder="Enter Password">

<input type="submit" value="Login">

<div class="footer">
© 2026 Online Electronic Store
</div>

</form>

</div>

</body>
</html>
